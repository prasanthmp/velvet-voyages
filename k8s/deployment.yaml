apiVersion: apps/v1
kind: Deployment
metadata:
  name: tripsense
  labels:
    app: tripsense
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tripsense
  template:
    metadata:
      labels:
        app: tripsense
    spec:
      containers:
        - name: tripsense
          image: docker.io/library/caddy:2-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
            - containerPort: 443
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 160Mi
          volumeMounts:
            - name: tripsense-static
              mountPath: /usr/share/caddy/index.html
              subPath: index.html
            - name: tripsense-static
              mountPath: /usr/share/caddy/get-started.html
              subPath: get-started.html
            - name: tripsense-static
              mountPath: /usr/share/caddy/styles.css
              subPath: styles.css
            - name: tripsense-static
              mountPath: /usr/share/caddy/app.js
              subPath: app.js
            - name: tripsense-static
              mountPath: /etc/caddy/Caddyfile
              subPath: Caddyfile
            - name: caddy-data
              mountPath: /data
      volumes:
        - name: tripsense-static
          configMap:
            name: tripsense-static
        - name: caddy-data
          persistentVolumeClaim:
            claimName: caddy-data
